tokens:
  gho_test_token_admin:
    login: admin
    scopes: [repo, user, admin:org, admin:repo_hook]
  gho_test_token_octocat:
    login: octocat
    scopes: [repo, user, read:user, "user:email", workflow]

github:
  users:
    - login: octocat
      name: The Octocat
      email: octocat@github.com
      bio: I am the Octocat
      company: GitHub
      location: San Francisco
    - login: developer
      name: Developer
      email: dev@example.com
  orgs:
    - login: my-org
      name: My Organization
      description: A test organization
  repos:
    - owner: octocat
      name: hello-world
      description: My first repository
      language: JavaScript
      topics: [hello, world]
      auto_init: true
    - owner: my-org
      name: org-repo
      description: An organization repository
      language: TypeScript
      auto_init: true
  apps:
    - app_id: 12345
      slug: my-github-app
      name: My GitHub App
      private_key: |
        -----BEGIN RSA PRIVATE KEY-----
        ...your PEM key...
        -----END RSA PRIVATE KEY-----
      permissions:
        contents: read
        issues: write
      events: [push, pull_request, issues]
      webhook_url: http://localhost:3000/webhooks/github
      webhook_secret: my-webhook-secret
      installations:
        - installation_id: 100
          account: octocat
          repository_selection: all
  oauth_apps:
    - client_id: emu_github_client_id
      client_secret: emu_github_client_secret
      name: Code App
      redirect_uris:
        - http://localhost:3000/api/auth/callback/github

vercel:
  users:
    - username: developer
      name: Developer
      email: dev@example.com
  teams:
    - slug: my-team
      name: My Team
  projects:
    - name: my-app
      team: my-team
      framework: nextjs
  integrations:
    - client_id: emu_vercel_client_id
      client_secret: emu_vercel_client_secret
      name: Code App (Vercel)
      redirect_uris:
        - http://localhost:3000/api/auth/callback/vercel

google:
  users:
    - email: testuser@gmail.com
      name: Test User
    - email: dev@example.com
      name: Developer
  oauth_clients:
    - client_id: emu_google_client_id
      client_secret: emu_google_client_secret
      name: Code App (Google)
      redirect_uris:
        - http://localhost:3000/api/auth/callback/google
  labels:
    - id: Label_ops
      user_email: testuser@gmail.com
      name: Ops/Review
      color_background: "#DDEEFF"
      color_text: "#111111"
  messages:
    - id: msg_welcome
      user_email: testuser@gmail.com
      from: welcome@example.com
      to: testuser@gmail.com
      subject: Welcome to the Gmail emulator
      body_text: You can now test Gmail, Calendar, and Drive flows locally.
      label_ids:
        - INBOX
        - UNREAD
        - CATEGORY_UPDATES
      date: 2025-01-04T10:00:00.000Z
  calendars:
    - id: primary
      user_email: testuser@gmail.com
      summary: testuser@gmail.com
      primary: true
      selected: true
      time_zone: UTC
  calendar_events:
    - id: evt_kickoff
      user_email: testuser@gmail.com
      calendar_id: primary
      summary: Project Kickoff
      start_date_time: 2025-01-10T09:00:00.000Z
      end_date_time: 2025-01-10T09:30:00.000Z
  drive_items:
    - id: drv_docs
      user_email: testuser@gmail.com
      name: Docs
      mime_type: application/vnd.google-apps.folder
      parent_ids:
        - root

microsoft:
  users:
    - email: testuser@outlook.com
      name: Test User
  oauth_clients:
    - client_id: emu_microsoft_client_id
      client_secret: emu_microsoft_client_secret
      name: Code App (Microsoft)
      redirect_uris:
        - http://localhost:3000/api/auth/callback/microsoft-entra-id
        - http://localhost:3000/api/outlook/linking/callback
        - http://localhost:3000/api/outlook/calendar/callback
        - http://localhost:3000/api/outlook/drive/callback
  categories:
    - id: cat_follow_up
      user_email: testuser@outlook.com
      display_name: Follow Up
      color: preset4
  folders:
    - id: custom_projects
      user_email: testuser@outlook.com
      display_name: Projects
  messages:
    - id: msg_outlook_welcome
      user_email: testuser@outlook.com
      from:
        address: welcome@example.com
        name: Welcome Team
      to_recipients:
        - address: testuser@outlook.com
      subject: Welcome to the Outlook emulator
      body_content: "<p>You can now test Outlook mail, calendar, and OneDrive flows locally.</p>"
      categories:
        - Follow Up
      parent_folder_id: inbox
  calendars:
    - id: primary
      user_email: testuser@outlook.com
      name: Calendar
      is_default_calendar: true
  calendar_events:
    - id: evt_planning
      user_email: testuser@outlook.com
      calendar_id: primary
      subject: Inbox Zero planning
      start_date_time: 2025-01-10T09:00:00.000Z
      end_date_time: 2025-01-10T09:30:00.000Z
      location_display_name: Teams
  drive_items:
    - id: drv_invoices
      user_email: testuser@outlook.com
      name: Invoices
      is_folder: true
