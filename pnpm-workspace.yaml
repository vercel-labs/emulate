packages:
  - "packages/*"
  - "packages/@emulators/*"
  - "apps/*"
  - "examples/*"
  - "tests/*"
allowBuilds:
  '@mongodb-js/zstd': true
  esbuild: true
  msw: true
  node-liblzma: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@aws-sdk/client-dynamodb@3.1050.0'
  - '@aws-sdk/client-sns@3.1050.0'
  - '@aws-sdk/client-eventbridge@3.1051.0'
