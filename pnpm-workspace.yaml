packages:
  - "packages/*"
  - "packages/@emulators/*"
  - "apps/*"
  - "examples/*"
  - "tests/*"
minimumReleaseAge: 2880
allowBuilds:
  '@mongodb-js/zstd': true
  esbuild: true
  msw: true
  node-liblzma: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@aws-sdk/client-dynamodb@3.1050.0'
  - '@aws-sdk/client-sns@3.1050.0'
  - '@aws-sdk/client-eventbridge@3.1051.0'
  - '@aws-sdk/client-cloudwatch-logs@3.1052.0'
  - '@aws-sdk/core@3.974.13'
  - '@aws-sdk/credential-provider-env@3.972.39'
  - '@aws-sdk/credential-provider-http@3.972.41'
  - '@aws-sdk/credential-provider-ini@3.972.43'
  - '@aws-sdk/credential-provider-login@3.972.43'
  - '@aws-sdk/credential-provider-node@3.972.44'
  - '@aws-sdk/credential-provider-process@3.972.39'
  - '@aws-sdk/credential-provider-sso@3.972.43'
  - '@aws-sdk/credential-provider-web-identity@3.972.43'
  - '@aws-sdk/nested-clients@3.997.11'
  - '@aws-sdk/signature-v4-multi-region@3.996.28'
  - '@aws-sdk/token-providers@3.1052.0'
  - '@aws-sdk/types@3.973.9'
  - '@aws-sdk/xml-builder@3.972.25'
  - '@aws-sdk/client-secrets-manager@3.1052.0'
  - '@aws-sdk/client-ssm@3.1052.0'
  - '@aws-sdk/client-kms@3.1052.0'
  - '@aws-sdk/client-lambda@3.1052.0'
